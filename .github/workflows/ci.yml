on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Run tests
        run: pytest

  publish:
    name: Publikuoti į PyPI
    needs: test                  # Vykdyti tik tada, jei testai praėjo sėkmingai
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' # Tik per push į main
    runs-on: ubuntu-latest
    
    permissions:
      id-token: write            # Būtina Trusted Publishers (OIDC) autorizacijai

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          python -m pip install --upgrade pip build
          python -m build        # Sukuria .tar.gz ir .whl failus 'dist/' aplanke

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1 # Oficialus PyPA įrankis išsiuntimui
